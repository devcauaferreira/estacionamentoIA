<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar | Estacionamentos</title>
    <script type="module" src="./js/pages/login.js"></script>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="flex min-h-screen items-center justify-center bg-slate-50 px-4 py-10 dark:bg-slate-950">
      <section class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-700 dark:bg-slate-800">
        <div class="mb-8 text-center">
          <img class="mx-auto h-20 w-auto" src="./assets/logo.png" alt="Logotipo do sistema" />
          <h1 class="mt-4 text-2xl font-bold text-slate-900 dark:text-white">Estacionamentos</h1>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">Acesse sua área com e-mail e senha.</p>
        </div>
        <form class="space-y-4" data-login-form>
          <div>
            <label class="label-field" for="email">E-mail</label>
            <input class="input-field" id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div>
            <label class="label-field" for="senha">Senha</label>
            <input class="input-field" id="senha" name="senha" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn-primary w-full" type="submit">
            <span data-heroicon="arrow-left-on-rectangle"></span>
            Entrar
          </button>
          <a class="block text-center text-sm font-medium text-primary hover:text-primary-hover" href="#">Esqueci minha senha</a>
        </form>
      </section>
    </main>
  </body>
</html>
