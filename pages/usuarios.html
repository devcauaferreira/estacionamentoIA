<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários | Estacionamentos</title>
    <script type="module" src="../js/pages/usuarios.js"></script>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-shell lg:flex">
      <aside class="border-b border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-800 lg:min-h-screen lg:w-64 lg:border-b-0 lg:border-r">
        <div class="mb-6 flex items-center gap-3"><img class="h-10 w-auto" src="../assets/logo.png" alt="Logotipo do sistema" /><strong>Estacionamentos</strong></div>
        <nav class="space-y-1" data-sidebar></nav>
      </aside>
      <div class="min-w-0 flex-1">
        <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4 dark:border-slate-700 dark:bg-slate-800">
          <div><p class="text-sm font-semibold" data-user-name>Usuário</p><p class="text-xs text-slate-500 dark:text-slate-300" data-user-role>Perfil</p></div>
          <div class="flex gap-2"><button class="btn-secondary" type="button" data-theme-toggle><span data-heroicon="moon"></span></button><button class="btn-danger" type="button" data-logout><span data-heroicon="arrow-left-on-rectangle"></span>Sair</button></div>
        </header>
        <main class="space-y-6 p-6">
          <div>
            <h1 class="text-2xl font-bold">Usuários</h1>
            <p class="text-sm text-slate-600 dark:text-slate-300">Cadastre novos usuários e clientes diretamente pelo painel administrativo.</p>
          </div>
          <section class="grid gap-6 xl:grid-cols-2">
            <form class="page-card space-y-4" data-form-usuario>
              <h2 class="text-lg font-bold">Cadastrar usuário</h2>
              <div>
                <label class="label-field" for="usuario-nome">Nome</label>
                <input class="input-field" id="usuario-nome" name="nome" type="text" required />
              </div>
              <div>
                <label class="label-field" for="usuario-email">E-mail</label>
                <input class="input-field" id="usuario-email" name="email" type="email" required />
              </div>
              <div>
                <label class="label-field" for="usuario-senha">Senha</label>
                <input class="input-field" id="usuario-senha" name="senha" type="password" minlength="6" required />
              </div>
              <div>
                <label class="label-field" for="usuario-tipo">Tipo de usuário</label>
                <select class="input-field" id="usuario-tipo" name="tipo_usuario" required>
                  <option value="proprietario">Proprietário</option>
                  <option value="cliente">Cliente</option>
                </select>
              </div>
              <div>
                <label class="label-field" for="usuario-telefone">Telefone (opcional)</label>
                <input class="input-field" id="usuario-telefone" name="telefone" type="tel" />
              </div>
              <button class="btn-primary" type="submit"><span data-heroicon="plus"></span>Cadastrar usuário</button>
            </form>
            <section class="page-card overflow-hidden">
              <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-700">
                <h2 class="text-lg font-bold">Usuários cadastrados</h2>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full min-w-[680px]">
                  <thead class="table-header">
                    <tr>
                      <th class="px-4 py-3 text-left">Nome</th>
                      <th class="px-4 py-3 text-left">E-mail</th>
                      <th class="px-4 py-3 text-left">Tipo</th>
                      <th class="px-4 py-3 text-left">Criado em</th>
                    </tr>
                  </thead>
                  <tbody data-usuarios-list></tbody>
                </table>
              </div>
            </section>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
