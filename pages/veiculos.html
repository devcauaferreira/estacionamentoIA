<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veículos | Estacionamentos</title>
    <script type="module" crossorigin src="../assets/veiculos-BNOrStUX.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/auth-C9HJbkKe.js">
    <link rel="modulepreload" crossorigin href="../assets/styles-BQuejN9J.js">
    <link rel="modulepreload" crossorigin href="../assets/layout-CHIie31U.js">
    <link rel="stylesheet" crossorigin href="../assets/styles-F6lsa_qP.css">
  </head>
  <body>
    <div class="app-shell lg:flex">
      <aside class="border-b border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-800 lg:min-h-screen lg:w-64 lg:border-b-0 lg:border-r">
        <div class="mb-6 flex items-center gap-3"><img class="h-10 w-auto" src="../assets/logo-DIVXN9jY.png" alt="Logotipo do sistema" /><strong>Estacionamentos</strong></div>
        <nav class="space-y-1" data-sidebar></nav>
      </aside>
      <div class="min-w-0 flex-1">
        <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4 dark:border-slate-700 dark:bg-slate-800">
          <div><p class="text-sm font-semibold" data-user-name>Usuário</p><p class="text-xs text-slate-500 dark:text-slate-300" data-user-role>Perfil</p></div>
          <div class="flex gap-2"><button class="btn-secondary" type="button" data-theme-toggle><span data-heroicon="moon"></span></button><button class="btn-danger" type="button" data-logout><span data-heroicon="arrow-left-on-rectangle"></span>Sair</button></div>
        </header>
        <main class="space-y-6 p-6">
          <div>
            <h1 class="text-2xl font-bold">Veículos</h1>
            <p class="text-sm text-slate-600 dark:text-slate-300">Cadastre veículos e associe-os a clientes ou ao atendimento avulso.</p>
          </div>
          <section class="grid gap-6 xl:grid-cols-2">
            <form class="page-card space-y-4" data-form-veiculo>
              <h2 class="text-lg font-bold">Cadastrar veículo</h2>
              <div>
                <label class="label-field" for="veiculo-placa">Placa</label>
                <input class="input-field uppercase" id="veiculo-placa" name="placa" placeholder="ABC1D23" required />
              </div>
              <div>
                <label class="label-field" for="veiculo-marca">Marca</label>
                <input class="input-field" id="veiculo-marca" name="marca" required />
              </div>
              <div>
                <label class="label-field" for="veiculo-modelo">Modelo</label>
                <input class="input-field" id="veiculo-modelo" name="modelo" required />
              </div>
              <div>
                <label class="label-field" for="veiculo-cor">Cor</label>
                <input class="input-field" id="veiculo-cor" name="cor" type="text" />
              </div>
              <div>
                <label class="label-field" for="veiculo-tipo">Tipo de cliente</label>
                <select class="input-field" id="veiculo-tipo" name="tipo_cliente" required>
                  <option value="avulso">Avulso</option>
                  <option value="mensalista">Mensalista</option>
                </select>
              </div>
              <div class="hidden" data-cliente-group>
                <label class="label-field" for="veiculo-cliente">Cliente</label>
                <select class="input-field" id="veiculo-cliente" name="cliente_id" data-cliente-select>
                  <option value="">Selecione um cliente</option>
                </select>
              </div>
              <button class="btn-primary" type="submit"><span data-heroicon="plus"></span>Cadastrar veículo</button>
            </form>
            <section class="page-card overflow-hidden">
              <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-700">
                <h2 class="text-lg font-bold">Veículos cadastrados</h2>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full min-w-[720px]">
                  <thead class="table-header">
                    <tr>
                      <th class="px-4 py-3 text-left">Placa</th>
                      <th class="px-4 py-3 text-left">Veículo</th>
                      <th class="px-4 py-3 text-left">Cliente</th>
                      <th class="px-4 py-3 text-left">Tipo</th>
                      <th class="px-4 py-3 text-left">Ativo</th>
                    </tr>
                  </thead>
                  <tbody data-veiculos-list></tbody>
                </table>
              </div>
            </section>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
